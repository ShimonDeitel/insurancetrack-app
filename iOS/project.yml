name: Insurancetrack
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  Insurancetrack:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Insurancetrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.insurancetrack
        INFOPLIST_FILE: Insurancetrack/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Insurancetrack"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    info:
      path: Insurancetrack/Info.plist
      properties:
        CFBundleDisplayName: "Insurancetrack"
        ITSAppUsesNonExemptEncryption: false
  InsurancetrackTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: InsurancetrackTests
    dependencies:
      - target: Insurancetrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.insurancetrack.tests
  InsurancetrackUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: InsurancetrackUITests
    dependencies:
      - target: Insurancetrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.insurancetrack.uitests
schemes:
  Insurancetrack:
    build:
      targets:
        Insurancetrack: all
    test:
      targets:
        - InsurancetrackTests
        - InsurancetrackUITests
    run:
      config: Debug
